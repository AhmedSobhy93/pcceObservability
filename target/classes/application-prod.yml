server:
  port: ${SERVER_PORT:8443}
  shutdown: graceful
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}

spring:
  h2:
    console:
      enabled: false
  datasource:
    url: ${APP_DB_URL:jdbc:postgresql://localhost:5432/pcce_observability}
    username: ${APP_DB_USERNAME:pcce_observability}
    password: ${APP_DB_PASSWORD:}
    driver-class-name: ${APP_DB_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${APP_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${APP_DB_MIN_IDLE:2}
      connection-timeout: ${APP_DB_CONNECTION_TIMEOUT_MS:5000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  file:
    name: ${LOG_FILE:logs/cx-observability.log}
  level:
    root: INFO
    com.cisco.cx.observability: INFO
    org.springframework.security: WARN

pcce:
  ssl:
    trust-store-path: ${PCCE_SSL_TRUST_STORE:}
    trust-store-password: ${PCCE_SSL_TRUST_STORE_PASS:changeit}
    verify-hostname: ${PCCE_SSL_VERIFY_HOSTNAME:true}

  audit:
    retention-days: ${PCCE_AUDIT_RETENTION_DAYS:90}

  security:
    rate-limit:
      enabled: ${PCCE_RATE_LIMIT_ENABLED:true}
      max-requests-per-minute: ${PCCE_RATE_LIMIT_RPM:120}

  datasources:
    aw:
      hikari:
        maximum-pool-size: ${AW_DB_MAX_POOL_SIZE:10}
        minimum-idle: ${AW_DB_MIN_IDLE:1}
        connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
        validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:3000}
    hds:
      hikari:
        maximum-pool-size: ${HDS_DB_MAX_POOL_SIZE:20}
        minimum-idle: ${HDS_DB_MIN_IDLE:2}
        connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
        validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:3000}
    cvp-reporting:
      hikari:
        maximum-pool-size: ${CVP_DB_MAX_POOL_SIZE:10}
        minimum-idle: ${CVP_DB_MIN_IDLE:1}
        connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
        validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:3000}

  operations:
    scheduled-assessment-enabled: ${PCCE_ASSESSMENT_ENABLED:true}
    assessment-fixed-delay-ms: ${PCCE_ASSESSMENT_FIXED_DELAY_MS:300000}
    component-latency-warning-ms: ${PCCE_COMPONENT_LATENCY_WARNING_MS:1500}
    component-latency-critical-ms: ${PCCE_COMPONENT_LATENCY_CRITICAL_MS:5000}
    dropped-calls-warning-threshold: ${PCCE_DROPPED_CALLS_WARNING:10}
    dropped-calls-critical-threshold: ${PCCE_DROPPED_CALLS_CRITICAL:25}
    service-level-warning-pct: ${PCCE_SERVICE_LEVEL_WARNING:80}
    service-level-critical-pct: ${PCCE_SERVICE_LEVEL_CRITICAL:70}
    audit-retention: ${PCCE_AUDIT_RETENTION:1000}

  live-data:
    enabled: ${PCCE_LIVE_DATA_ENABLED:false}
    host: ${PCCE_LIVE_DATA_HOST:}
    port: ${PCCE_LIVE_DATA_PORT:443}
    websocket-port: ${PCCE_LIVE_DATA_WEBSOCKET_PORT:443}
    token-path: ${PCCE_LIVE_DATA_TOKEN_PATH:livedata/token/new}
    username: ${PCCE_LIVE_DATA_USERNAME:}
    password: ${PCCE_LIVE_DATA_PASSWORD:}
    timeout: ${PCCE_LIVE_DATA_TIMEOUT:10s}
    trust-all-certificates: ${PCCE_LIVE_DATA_TRUST_ALL_CERTIFICATES:false}

  jmx:
    enabled: ${PCCE_JMX_ENABLED:false}
    username: ${PCCE_JMX_USERNAME:}
    password: ${PCCE_JMX_PASSWORD:}
    timeout: ${PCCE_JMX_TIMEOUT:10s}
    trust-store-configured: ${PCCE_JMX_TRUST_STORE_CONFIGURED:false}
    targets:
      - name: CVP Call Server JMX A
        component: CVP_CallServer
        enabled: ${PCCE_JMX_CVP_CALLSERVER_A_ENABLED:false}
        service-url: ${PCCE_JMX_CVP_CALLSERVER_A_URL:}
      - name: CVP Call Server JMX B
        component: CVP_CallServer
        enabled: ${PCCE_JMX_CVP_CALLSERVER_B_ENABLED:false}
        service-url: ${PCCE_JMX_CVP_CALLSERVER_B_URL:}
      - name: CVP Reporting JMX
        component: CVP_ReportingServer
        enabled: ${PCCE_JMX_CVP_REPORTING_ENABLED:false}
        service-url: ${PCCE_JMX_CVP_REPORTING_URL:}

  app-dynamics:
    enabled: ${APPD_ENABLED:false}
    controller-url: ${APPD_CONTROLLER_URL:}
    account-name: ${APPD_ACCOUNT_NAME:}
    username: ${APPD_USERNAME:}
    password: ${APPD_PASSWORD:}
    application-name: ${APPD_APPLICATION_NAME:PCCE}
    timeout: ${APPD_TIMEOUT:10s}
    trust-all-certificates: ${APPD_TRUST_ALL_CERTIFICATES:false}
    dashboards:
      - name: PCCE Application Flow Map
        area: Contact Center APM
        enabled: true
        url: ${APPD_PCCE_FLOWMAP_URL:}
        description: PCCE service flow, business transactions, errors and response time
      - name: CVP / IVR JVM Health
        area: CVP
        enabled: true
        url: ${APPD_CVP_JVM_URL:}
        description: CVP JVM, servlet, backend and error monitoring

  cvp-api:
    enabled: ${CVP_API_ENABLED:false}
    base-url: ${CVP_API_BASE_URL:}
    username: ${CVP_API_USERNAME:}
    password: ${CVP_API_PASSWORD:}
    auth-mode: ${CVP_API_AUTH_MODE:BASIC}
    bearer-token: ${CVP_API_BEARER_TOKEN:}
    api-key-header-name: ${CVP_API_KEY_HEADER_NAME:}
    api-key: ${CVP_API_KEY:}
    timeout: ${CVP_API_TIMEOUT:10s}
    trust-all-certificates: ${CVP_API_TRUST_ALL_CERTIFICATES:false}

  components:
    - name: ICM_Router
      display-name: Router A
      side: A
      site: DC1
      tier: ICM
      enabled: ${MON_ROUTER_A_ENABLED:true}
      probe: TCP
      host: ${ROUTER_A_HOST:router-a.example.local}
      port: ${ROUTER_A_PORT:4000}
      timeout: 5s
    - name: ICM_Router
      display-name: Router B
      side: B
      site: DC2
      tier: ICM
      enabled: ${MON_ROUTER_B_ENABLED:true}
      probe: TCP
      host: ${ROUTER_B_HOST:router-b.example.local}
      port: ${ROUTER_B_PORT:4000}
      timeout: 5s
    - name: ICM_Logger
      display-name: Logger A
      side: A
      site: DC1
      tier: ICM
      enabled: true
      probe: JDBC_AW
    - name: HDS
      display-name: HDS / AW A
      side: A
      site: DC1
      tier: REPORTING
      enabled: true
      probe: JDBC_HDS
    - name: ICM_Distributor_AW
      display-name: AW Distributor A
      side: A
      site: DC1
      tier: ADMIN
      enabled: ${MON_AW_A_ENABLED:true}
      probe: HTTP
      url: ${AW_A_HEALTH_URL:https://aw-a.example.local/unifiedconfig/config/deploymenttype}
      timeout: 10s
      trust-all-certificates: false
      expected-status-min: 200
      expected-status-max: 499
    - name: ICM_Distributor_AW
      display-name: AW Distributor B
      side: B
      site: DC2
      tier: ADMIN
      enabled: ${MON_AW_B_ENABLED:true}
      probe: HTTP
      url: ${AW_B_HEALTH_URL:https://aw-b.example.local/unifiedconfig/config/deploymenttype}
