<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="statusList" class="component-grid" x-data="{open:true}">
    <div class="panel-head">
        <h2>Component Health</h2>
        <button class="small-btn" type="button" x-on:click="open = !open" x-text="open ? 'Hide' : 'Show'">Hide</button>
    </div>
    <div x-show="open">
        <article class="metric-row" th:each="component : ${components}">
            <div>
                <strong th:text="${component.displayName()}">Component</strong>
                <span class="sub" th:text="${component.probe() + ' - ' + component.target()}">Probe</span>
            </div>
            <span class="status-pill"
                  th:classappend="${#strings.toLowerCase(component.state().name())}"
                  th:text="${component.state()}">UP</span>
            <small th:text="${component.latencyMs() + ' ms'}">0 ms</small>
        </article>
        <p class="empty-state" th:if="${#lists.isEmpty(components)}">No component status data is available.</p>
    </div>
</section>
</body>
</html>
