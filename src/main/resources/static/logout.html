<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signed Out</title>
    <link rel="stylesheet" href="/login.css">
</head>
<body>
<main class="login-shell">
    <section class="login-panel">
        <div class="brand-row">
            <div class="brand-mark">CC</div>
            <div>
                <h1>Signed out</h1>
                <p>Your PCCE Observability session has ended.</p>
            </div>
        </div>
        <div class="status-message ok">You can safely close this browser tab or sign in again.</div>
        <form class="login-form" action="/login" method="get">
            <button type="submit">Back to sign in</button>
        </form>
    </section>
</main>
</body>
</html>
